<app-nav></app-nav>
<div class="page-wrapper">
  <div class="container">
    <div class="row justify-content-center">
      <div class="col-lg-7">
        <div class="card p-4 p-md-5">
          <div class="mb-4">
            <h4 class="fw-bold mb-1" style="color: var(--text-primary);">
              <i class="bi bi-send me-2" style="color: var(--primary);"></i>Submit Proposal
            </h4>
            <p class="text-muted small">Write a compelling proposal to win this job</p>
          </div>

          <form [formGroup]="form" (ngSubmit)="proposalSubmit(form.value)">
            <input type="hidden" formControlName="jobApplyer" />
            <input type="hidden" formControlName="job" />

            <div class="mb-4">
              <label class="form-label fw-medium small">Your Proposal <span class="text-danger">*</span></label>
              <textarea
                class="form-control"
                rows="7"
                placeholder="Introduce yourself, explain why you're the best fit, describe your approach, and include your estimated timeline and cost..."
                formControlName="proposal"
              ></textarea>
              <div class="form-text text-muted small mt-1">
                <i class="bi bi-lightbulb me-1"></i>Tip: A great proposal is specific, professional, and shows you understood the job requirements.
              </div>
            </div>

            <div class="d-flex gap-3">
              <button type="submit" class="btn btn-primary flex-grow-1 py-2 fw-semibold" [disabled]="form.invalid">
                <i class="bi bi-send me-2"></i>Submit Proposal
              </button>
              <a routerLink="/jobs" class="btn btn-outline-secondary py-2 px-4">Cancel</a>
            </div>
          </form>
        </div>
      </div>
    </div>
  </div>
</div>
<app-footer></app-footer>
