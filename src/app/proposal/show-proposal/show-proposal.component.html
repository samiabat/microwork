<app-nav></app-nav>
<div class="page-wrapper">
  <div class="container">

    <!-- Job Details Card -->
    <div *ngIf="job!=undefined" class="card p-4 mb-4">
      <div class="d-flex align-items-start justify-content-between mb-3">
        <div>
          <h4 class="fw-bold mb-1" style="color: var(--text-primary);">{{job.title}}</h4>
          <div class="d-flex gap-2 flex-wrap">
            <span class="badge rounded-pill" style="background: var(--primary-light); color: var(--primary); font-size: 0.75rem;">
              {{job.status | titlecase}}
            </span>
            <span class="badge rounded-pill bg-success-subtle text-success" style="font-size: 0.75rem;">
              ${{job.salary}}
            </span>
          </div>
        </div>
        <span class="text-muted small">
          <i class="bi bi-person-circle me-1"></i>{{job.customer}}
        </span>
      </div>
      <p class="text-muted small lh-relaxed">{{job.description}}</p>
    </div>

    <!-- Proposals Section -->
    <div class="d-flex align-items-center justify-content-between mb-3">
      <h5 class="fw-bold mb-0" style="color: var(--text-primary);">
        <i class="bi bi-people me-2" style="color: var(--primary);"></i>Submitted Proposals
      </h5>
    </div>

    <div *ngIf="check && job!=undefined">
      <div *ngFor="let proposal of proposalList">
        <div *ngIf="proposal.job==job.id" class="card p-4 mb-3">
          <div class="d-flex align-items-start gap-3">
            <div class="applicant-avatar flex-shrink-0">
              <i class="bi bi-person-fill"></i>
            </div>
            <div class="flex-grow-1">
              <div class="d-flex align-items-center justify-content-between mb-2">
                <div>
                  <span class="fw-semibold">@{{proposal.jobApplyer}}</span>
                </div>
                <button class="btn btn-sm btn-success" routerLink="/message">
                  <i class="bi bi-check-circle me-1"></i>Confirm
                </button>
              </div>
              <div class="proposal-text p-3 rounded-3 small">
                {{proposal.proposal}}
              </div>
            </div>
          </div>
        </div>
      </div>
    </div>

  </div>
</div>
<app-footer></app-footer>
