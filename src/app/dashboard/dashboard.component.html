<div *ngIf="check" class="profile-card card p-4">
  <div class="text-center mb-3">
    <div class="avatar-circle mx-auto mb-3">
      <i class="bi bi-person-fill"></i>
    </div>
    <h6 class="fw-bold mb-0" style="color: var(--text-primary);">{{data.name}}</h6>
    <p class="text-muted small mb-2">@{{data.username}}</p>
    <span *ngIf="report > 0" class="badge bg-danger-subtle text-danger small">
      <i class="bi bi-flag me-1"></i>{{report}} Report(s)
    </span>
    <span *ngIf="report == 0" class="badge bg-success-subtle text-success small">
      <i class="bi bi-shield-check me-1"></i>Good Standing
    </span>
  </div>
  <hr>
  <div class="d-flex justify-content-between small text-muted">
    <span><i class="bi bi-envelope me-1"></i>{{data.email}}</span>
  </div>
  <div class="mt-3">
    <a routerLink="/createJob" class="btn btn-primary btn-sm w-100">
      <i class="bi bi-plus me-1"></i>Post a Job
    </a>
  </div>
</div>

<div *ngIf="!check" class="profile-card card p-4 text-center">
  <div class="avatar-circle mx-auto mb-3 text-muted" style="background: var(--bg);">
    <i class="bi bi-person" style="color: var(--text-muted);"></i>
  </div>
  <p class="text-muted small">Sign in to view your profile</p>
  <a routerLink="/login" class="btn btn-primary btn-sm">
    <i class="bi bi-box-arrow-in-right me-1"></i>Sign In
  </a>
</div>
