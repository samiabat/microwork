<div class="auth-wrapper d-flex align-items-center justify-content-center min-vh-100">
  <div class="auth-card card shadow-sm p-4 p-md-5">
    <div class="text-center mb-4">
      <div class="auth-logo mb-3">
        <i class="bi bi-briefcase-fill"></i>
      </div>
      <h2 class="fw-bold mb-1" style="color: var(--text-primary);">Welcome back</h2>
      <p class="text-muted small">Sign in to your Microworks account</p>
    </div>

    <form [formGroup]="login" (ngSubmit)="loginSubmit(login.value)">
      <div class="mb-3">
        <label class="form-label fw-medium small" for="loginUsername">Username</label>
        <div class="input-group">
          <span class="input-group-text bg-white border-end-0"><i class="bi bi-person text-muted"></i></span>
          <input
            type="text"
            class="form-control border-start-0 ps-0"
            id="loginUsername"
            placeholder="Enter your username"
            formControlName="username"
            [class.is-invalid]="login.get('username').invalid && login.get('username').touched"
            [class.is-valid]="login.get('username').valid && login.get('username').touched"
          />
        </div>
        <div *ngIf="login.get('username').invalid && login.get('username').touched" class="form-text text-danger small">
          <i class="bi bi-exclamation-circle me-1"></i>Username must be at least 4 characters
        </div>
      </div>

      <div class="mb-4">
        <label class="form-label fw-medium small" for="loginPassword">Password</label>
        <div class="input-group">
          <span class="input-group-text bg-white border-end-0"><i class="bi bi-lock text-muted"></i></span>
          <input
            type="password"
            class="form-control border-start-0 ps-0"
            id="loginPassword"
            placeholder="Enter your password"
            formControlName="password"
            [class.is-invalid]="login.get('password').invalid && login.get('password').touched"
            [class.is-valid]="login.get('password').valid && login.get('password').touched"
          />
        </div>
        <div *ngIf="login.get('password').invalid && login.get('password').touched" class="form-text text-danger small">
          <i class="bi bi-exclamation-circle me-1"></i>Password must be at least 4 characters
        </div>
      </div>

      <button
        type="submit"
        class="btn btn-primary w-100 py-2 fw-semibold"
        [disabled]="login.invalid"
      >
        <i class="bi bi-box-arrow-in-right me-2"></i>Sign In
      </button>
    </form>

    <hr class="my-4">
    <p class="text-center text-muted small mb-3">Don't have an account?</p>
    <button (click)="goToSignup()" class="btn btn-outline-primary w-100 py-2 fw-semibold">
      <i class="bi bi-person-plus me-2"></i>Create Account
    </button>
  </div>
</div>
