<app-nav></app-nav>
<div class="page-wrapper">
  <div class="container">
    <div class="row justify-content-center">
      <div class="col-lg-7">
        <div class="card p-4 p-md-5">
          <div class="mb-4">
            <h4 class="fw-bold mb-1" style="color: var(--text-primary);">
              <i class="bi bi-briefcase me-2" style="color: var(--primary);"></i>
              {{isEdit ? 'Update Job' : 'Post a New Job'}}
            </h4>
            <p class="text-muted small">{{isEdit ? 'Update the details of your job posting.' : 'Fill in the details to attract the right talent.'}}</p>
          </div>

          <form [formGroup]="form">
            <div class="mb-3">
              <label class="form-label fw-medium small">Job Title <span class="text-danger">*</span></label>
              <input type="text" class="form-control" placeholder="e.g. Senior React Developer" formControlName="title"
                [class.is-invalid]="form.get('title').invalid && form.get('title').touched" />
              <div class="invalid-feedback">Job title is required</div>
            </div>

            <input type="hidden" formControlName="customer" />

            <div class="mb-3">
              <label class="form-label fw-medium small">Description <span class="text-danger">*</span></label>
              <textarea class="form-control" rows="5" placeholder="Describe the job requirements, responsibilities, and what you're looking for..." formControlName="description"></textarea>
            </div>

            <div class="row g-3 mb-3">
              <div class="col-md-6">
                <label class="form-label fw-medium small">Experience Level <span class="text-danger">*</span></label>
                <select class="form-select" formControlName="status">
                  <option [ngValue]="null" [disabled]="true">Select level</option>
                  <option value="expert">Expert</option>
                  <option value="intermidate">Intermediate</option>
                  <option value="beginer">Beginner</option>
                </select>
              </div>
              <div class="col-md-6">
                <label class="form-label fw-medium small">Budget (USD) <span class="text-danger">*</span></label>
                <div class="input-group">
                  <span class="input-group-text">$</span>
                  <input type="number" class="form-control" placeholder="0.00" formControlName="salary" min="0" />
                </div>
              </div>
            </div>

            <div class="d-flex gap-3 mt-4">
              <button
                type="button"
                class="btn btn-primary flex-grow-1 py-2 fw-semibold"
                (click)="isEdit ? jobEdit() : jobSubmit(form.value)"
                [disabled]="form.invalid"
              >
                <i class="bi bi-check-lg me-2"></i>{{isEdit ? 'Update Job' : 'Post Job'}}
              </button>
              <a routerLink="/jobs" class="btn btn-outline-secondary py-2 px-4">Cancel</a>
            </div>
          </form>
        </div>
      </div>
    </div>
  </div>
</div>
<app-footer></app-footer>
