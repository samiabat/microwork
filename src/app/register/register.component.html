<div class="auth-wrapper d-flex align-items-center justify-content-center min-vh-100">
  <div class="auth-card card shadow-sm p-4 p-md-5">
    <div class="text-center mb-4">
      <div class="auth-logo mb-3">
        <i class="bi bi-person-plus-fill"></i>
      </div>
      <h2 class="fw-bold mb-1" style="color: var(--text-primary);">Create account</h2>
      <p class="text-muted small">Join Microworks and start working today</p>
    </div>

    <form [formGroup]="register" (ngSubmit)="submitRegister(register.value)">
      <div class="mb-3">
        <label class="form-label fw-medium small">Full Name</label>
        <div class="input-group">
          <span class="input-group-text bg-white border-end-0"><i class="bi bi-person text-muted"></i></span>
          <input type="text" class="form-control border-start-0 ps-0" placeholder="Your full name" formControlName="name"
            [class.is-invalid]="register.get('name').invalid && register.get('name').touched"
            [class.is-valid]="register.get('name').valid && register.get('name').touched" />
        </div>
        <div *ngIf="register.get('name').invalid && register.get('name').touched" class="form-text text-danger small">
          <i class="bi bi-exclamation-circle me-1"></i>Name must be at least 4 characters
        </div>
      </div>

      <div class="mb-3">
        <label class="form-label fw-medium small">Email Address</label>
        <div class="input-group">
          <span class="input-group-text bg-white border-end-0"><i class="bi bi-envelope text-muted"></i></span>
          <input type="email" class="form-control border-start-0 ps-0" placeholder="you@example.com" formControlName="email"
            [class.is-invalid]="register.get('email').invalid && register.get('email').touched"
            [class.is-valid]="register.get('email').valid && register.get('email').touched" />
        </div>
        <div *ngIf="register.get('email').invalid && register.get('email').touched" class="form-text text-danger small">
          <i class="bi bi-exclamation-circle me-1"></i>Please enter a valid email address
        </div>
      </div>

      <div class="mb-3">
        <label class="form-label fw-medium small">Username</label>
        <div class="input-group">
          <span class="input-group-text bg-white border-end-0"><i class="bi bi-at text-muted"></i></span>
          <input type="text" class="form-control border-start-0 ps-0" placeholder="Choose a username" formControlName="username"
            [class.is-invalid]="register.get('username').invalid && register.get('username').touched"
            [class.is-valid]="register.get('username').valid && register.get('username').touched" />
        </div>
        <div *ngIf="register.get('username').invalid && register.get('username').touched" class="form-text text-danger small">
          <i class="bi bi-exclamation-circle me-1"></i>Username must be at least 4 characters
        </div>
      </div>

      <div class="mb-3">
        <label class="form-label fw-medium small">Password</label>
        <div class="input-group">
          <span class="input-group-text bg-white border-end-0"><i class="bi bi-lock text-muted"></i></span>
          <input type="password" class="form-control border-start-0 ps-0" placeholder="Create a password" formControlName="password"
            [class.is-invalid]="register.get('password').invalid && register.get('password').touched"
            [class.is-valid]="register.get('password').valid && register.get('password').touched" />
        </div>
        <div *ngIf="register.get('password').invalid && register.get('password').touched" class="form-text text-danger small">
          <i class="bi bi-exclamation-circle me-1"></i>Password must be at least 4 characters
        </div>
      </div>

      <div class="mb-4">
        <label class="form-label fw-medium small">Confirm Password</label>
        <div class="input-group">
          <span class="input-group-text bg-white border-end-0"><i class="bi bi-lock-fill text-muted"></i></span>
          <input type="password" class="form-control border-start-0 ps-0" placeholder="Repeat your password" formControlName="repeatPassword"
            [class.is-invalid]="register.get('repeatPassword').invalid && register.get('repeatPassword').touched"
            [class.is-valid]="register.get('repeatPassword').valid && register.get('repeatPassword').touched" />
        </div>
        <div *ngIf="register.get('repeatPassword').invalid && register.get('repeatPassword').touched" class="form-text text-danger small">
          <i class="bi bi-exclamation-circle me-1"></i>Please repeat your password
        </div>
      </div>

      <button type="submit" class="btn btn-primary w-100 py-2 fw-semibold" [disabled]="register.invalid">
        <i class="bi bi-person-check me-2"></i>Create Account
      </button>
    </form>

    <hr class="my-4">
    <p class="text-center text-muted small mb-3">Already have an account?</p>
    <button (click)="gotToLogin()" class="btn btn-outline-primary w-100 py-2 fw-semibold">
      <i class="bi bi-box-arrow-in-right me-2"></i>Sign In
    </button>
  </div>
</div>
